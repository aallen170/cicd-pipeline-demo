name: CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # following is unecessary since image is already deployed to ACR in CI pipeline, but keeping it here for reference

      # - name: Log in to Azure Container Registry
      #   uses: azure/docker-login@v2
      #   with:
      #     login-server: ${{ secrets.ACR_LOGIN_SERVER }}
      #     username: ${{ secrets.ACR_USERNAME }}
      #     password: ${{ secrets.ACR_PASSWORD }}

      # - name: Build and push Docker image
      #   run: |
      #     docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/engfolio-app:latest .
      #     docker push ${{ secrets.ACR_LOGIN_SERVER }}/engfolio-app:latest

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/engfolio-app:latest

      - name: Verify deployment
        run: |
          sleep 30
          curl --fail https://engfolio-app-b0dcaaajhdc4d9gs.eastus-01.azurewebsites.net/health