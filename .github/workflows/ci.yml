name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run linting
        run: ruff check .

      - name: Check formatting
        run: black --check .

      - name: Run tests
        run: pytest tests

      - name: Build Docker image
        run: docker build -t engfolio-app .

      - name: Login to ACR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}

      - name: Tag and push image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker tag engfolio-app:latest ${{ secrets.ACR_LOGIN_SERVER }}/engfolio-app:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/engfolio-app:latest